    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --secondary: #e2e8f0;
            --secondary-hover: #cbd5e1;
            --bg: #f1f5f9;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
            --export: #8b5cf6; 
            --export-hover: #7c3aed;
            --danger: #ef4444;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background-color: var(--bg); 
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
            color: var(--text-main);
        }

        .container { 
            background: var(--surface); 
            padding: 2.5rem 2rem; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            width: 100%;
            max-width: 450px; 
        }

        .header-title { margin-top: 0; margin-bottom: 5px; font-size: 1.5rem; text-align: center; }
        .header-subtitle { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 25px; text-align: center; }

        select, input { 
            padding: 12px; font-size: 15px; width: 100%; margin-bottom: 10px; 
            border: 2px solid var(--border); border-radius: 10px; font-weight: 600;
            outline: none; box-sizing: border-box;
        }
        
        input:focus, select:focus { border-color: var(--primary); }

        .botoes-grupo { display: flex; gap: 10px; margin-bottom: 10px; }

        button { 
            padding: 14px 16px; font-size: 16px; border: none; border-radius: 10px; 
            cursor: pointer; font-weight: 600; transition: all 0.2s ease;
        }

        button:active { transform: scale(0.98); }
        .btn-buscar { background-color: var(--primary); color: white; flex: 2; }
        .btn-limpar { background-color: var(--secondary); color: var(--text-main); flex: 1; }
        
        .btn-exportar { background-color: var(--export); color: white; width: 100%; margin-bottom: 8px; }
        .btn-esvaziar { background-color: #fee2e2; color: var(--danger); width: 100%; font-size: 13px; padding: 8px; }

        #mensagem { margin-top: 15px; font-size: 14px; font-weight: 600; min-height: 20px; text-align: center; }
        #listaResultados { margin-top: 20px; display: flex; flex-direction: column; gap: 15px; }

        .item-medidor {
            background: var(--surface); border: 1px solid var(--border);
            padding: 18px; border-radius: 12px; animation: fadeIn 0.4s ease forwards;
        }

        .cabecalho-card {
            display: flex; justify-content: space-between; align-items: flex-start;
            margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border);
        }

        .info-numero { font-size: 1.25rem; font-weight: 700; color: var(--primary); }
        .info-label { font-size: 11px; text-transform: uppercase; color: var(--text-muted); font-weight: 700; display: block; }

        .btn-add-lista { background: var(--primary); color: white; padding: 8px 12px; font-size: 12px; border-radius: 8px; }
        .btn-mapa { background-color: var(--success); color: white; text-decoration: none; padding: 8px 12px; border-radius: 8px; font-size: 14px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
